<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Gateway</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: radial-gradient(circle,#0ea5e9,#020617,#000);
    color:white;
}

.box{
    width:90%;
    max-width:380px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    background:rgba(15,23,42,0.85);
    border:1px solid rgba(56,189,248,0.3);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    background:#38bdf8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
}

h2{
    margin-top:15px;
    color:#7dd3fc;
}

.spinner{
    width:70px;
    height:70px;
    margin:25px auto;
    border:4px solid transparent;
    border-top:4px solid #38bdf8;
    border-radius:50%;
    animation:spin 0.6s linear infinite;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#cbd5e1;
}

.result{
    margin-top:15px;
    padding:15px;
    border-radius:12px;
}

.success{
    background:rgba(34,197,94,0.15);
    border:1px solid rgba(34,197,94,0.4);
}

.fail{
    background:rgba(239,68,68,0.15);
    border:1px solid rgba(239,68,68,0.4);
}

.icon{
    font-size:35px;
    margin-bottom:10px;
}

.title{
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

    <div class="logo">🔒</div>
    <h2>Security Gateway</h2>

    <div id="loader" class="spinner"></div>
    <div id="status" class="status">Starting Verification...</div>

</div>

<script>

async function startVerify(){

    const tg = window.Telegram?.WebApp || null;

    if(tg){
        try{
            tg.ready();
            tg.expand();
        }catch(e){}
    }

    const status = document.getElementById("status");
    const loader = document.getElementById("loader");

    const url = new URL(window.location.href);
    const botusername = url.searchParams.get("botusername");
    const bottoken = url.searchParams.get("bottoken");

    if(!botusername || !bottoken){
        loader.style.display="none";
        status.innerHTML = "❌ Missing Config";
        return;
    }

    let tg_id = "browser_user";

    if(tg?.initDataUnsafe?.user){
        tg_id = tg.initDataUnsafe.user.id.toString();
    }

    try {

        status.innerHTML = "🔐 Generating Device ID...";

        const fp = await FingerprintJS.load();
        const res = await fp.get();
        const browser_id = res.visitorId;

        status.innerHTML = "⚡ Verifying Security...";

        const api = `/api?botusername=${botusername}&bottoken=${bottoken}&tg_id=${tg_id}&browser_id=${browser_id}`;

        const response = await fetch(api);
        const data = await response.json();

        loader.style.display = "none";

        if(data.status === "pass"){

            status.innerHTML = `
            <div class="result success">
                <div class="icon">✅</div>
                <div class="title">VERIFIED SUCCESS</div>
                <div>Access Granted</div>
            </div>
            `;

            // ✅ SAFE AUTO CLOSE FIX
            if(tg){
                setTimeout(() => {
                    try{
                        tg.close();
                    }catch(e){}
                }, 900);
            }

        } else {

            status.innerHTML = `
            <div class="result fail">
                <div class="icon">❌</div>
                <div class="title">VERIFICATION FAILED</div>
                <div>${data.message || "Try Again"}</div>
            </div>
            `;
        }

    } catch(err) {

        loader.style.display = "none";

        status.innerHTML = `
        <div class="result fail">
            <div class="icon">⚠️</div>
            <div class="title">NETWORK ERROR</div>
            <div>Please try again</div>
        </div>
        `;
    }
}

window.onload = startVerify;

</script>

</body>
</html>
