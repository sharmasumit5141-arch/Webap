<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Secure Verification</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family: system-ui;
    background: radial-gradient(circle at top, #0f172a, #020617);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:340px;
    padding:25px;
    border-radius:18px;
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h2{
    margin:0;
    font-size:22px;
}

#status{
    margin-top:20px;
    padding:12px;
    border-radius:12px;
    font-size:15px;
    background:rgba(255,255,255,0.05);
}

/* BUTTON */
button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

/* STATES */
.ok{ color:#22c55e; }
.fail{ color:#ef4444; }
.wait{ color:#fbbf24; }

.small{
    font-size:12px;
    opacity:0.7;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

    <h2>🔐 Secure Verification</h2>

    <div id="status" class="wait">
        ⏳ Initializing...
    </div>

    <button onclick="verify()">🔄 Retry Verification</button>

    <div class="small">
        VPN Protected System
    </div>

</div>

<script>

/* =========================
   TELEGRAM INIT
========================= */
let tg = window.Telegram.WebApp;
tg.ready();

let user = tg.initDataUnsafe?.user || {};
let tg_id = user.id || "0";

/* =========================
   VERIFY FUNCTION
========================= */
async function verify(){

    const status = document.getElementById("status");

    status.innerText = "⏳ Verifying...";
    status.className = "wait";

    const params = new URLSearchParams(window.location.search);

    const botusername = params.get("botusername");
    const bottoken = params.get("bottoken");

    const browser_id =
        navigator.userAgent +
        "_" +
        screen.width +
        "x" +
        screen.height;

    const apiUrl =
        `${window.location.origin}/api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browser_id)}`;

    try {

        const res = await fetch(apiUrl);
        const data = await res.json();

        /* =========================
           SUCCESS
        ========================= */
        if (data.status === "pass") {

            status.innerText = "🎉 VERIFIED SUCCESSFULLY";
            status.className = "ok";

        }

        /* =========================
           FAIL
        ========================= */
        else {

            status.innerText = data.message || "❌ ACCESS DENIED";
            status.className = "fail";
        }

    } catch (e) {

        status.innerText = "⚠️ SERVER ERROR - TRY AGAIN";
        status.className = "fail";
    }
}

/* AUTO RUN */
verify();

</script>

</body>
</html>
