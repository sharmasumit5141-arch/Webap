<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway Verification</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Hardware Fingerprint Script -->
    <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            background: #1e293b; 
            padding: 35px; 
            border-radius: 16px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 380px; 
            width: 90%; 
            border: 1px solid #334155;
        }
        h2 { margin-top: 0; font-size: 22px; color: #38bdf8; letter-spacing: 0.5px; }
        .status-msg { font-size: 16px; margin: 20px 0; line-height: 1.6; min-height: 50px; }
        .loading { color: #94a3b8; }
        .success { color: #4ade80; font-weight: bold; }
        .error { color: #f87171; font-weight: bold; }
        
        /* Spinner CSS Animation */
        .spinner {
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Security Gateway v2</h2>
        <div id="loader" class="spinner"></div>
        <div id="status" class="status-msg loading">🔒 Fetching dynamic bot parameters...</div>
    </div>

    <script>
        async function startVerify() {
            const statusDiv = document.getElementById('status');
            const loaderDiv = document.getElementById('loader');

            // 1. URL parsing setup (Crash protection if URL is malformed)
            let botusername = "";
            let bottoken = "";
            try {
                const urlObj = new URL(window.location.href);
                botusername = urlObj.searchParams.get('botusername');
                bottoken = urlObj.searchParams.get('bottoken');
            } catch (e) {
                console.error("URL Parsing failed", e);
            }

            // Fallback check if standard parameters missing
            if (!botusername || !bottoken) {
                loaderDiv.style.display = 'none';
                statusDiv.className = 'status-msg error';
                statusDiv.innerHTML = "❌ Configuration Missing!<br><span style='font-size:13px;font-weight:normal;color:#94a3b8;'>URL Parameters (botusername/bottoken) require authorization.</span>";
                return;
            }

            // 2. Telegram Web App integration handling
            let tg_id = "BROWSER_TEST_ID";
            let first_name = "Tester";
            
            const tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) {
                tg.ready();
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    tg_id = tg.initDataUnsafe.user.id.toString();
                    first_name = tg.initDataUnsafe.user.first_name || "User";
                }
            }

            statusDiv.innerText = "🔒 Analyzing device hardware integrity...";

            try {
                // 3. Fingerprint Generation
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                const browserId = result.visitorId;

                statusDiv.innerText = "⚡ Authorizing session with MongoDB...";

                // 4. Secure API Hit
                const apiUrl = `/verify-api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browserId)}&name=${encodeURIComponent(first_name)}`;
                
                const res = await fetch(apiUrl);
                const data = await res.json();

                loaderDiv.style.display = 'none'; // Hide loader after getting response

                if (data.status === 'pass') {
                    statusDiv.className = 'status-msg success';
                    statusDiv.innerHTML = `✅ Verified Successfully!<br><span style='font-size:14px;color:#94a3b8;font-weight:normal;'>Welcome back, ${first_name}. Access Granted.</span>`;
                    
                    // Close Telegram Mini App automatically if open inside Telegram
                    if (tg) {
                        setTimeout(() => { tg.close(); }, 2000);
                    }
                } else {
                    statusDiv.className = 'status-msg error';
                    statusDiv.innerText = "❌ Access Denied: " + data.message;
                }

            } catch (err) {
                console.error(err);
                loaderDiv.style.display = 'none';
                statusDiv.className = 'status-msg error';
                statusDiv.innerHTML = "❌ Connection Refused!<br><span style='font-size:13px;font-weight:normal;color:#94a3b8;'>Gateway closed or database communication timed out.</span>";
            }
        }

        // Trigger loading sequence safely
        window.onload = startVerify;
    </script>
</body>
</html>
