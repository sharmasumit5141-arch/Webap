<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Security Gateway</title>

<!-- Telegram WebApp Script -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- FingerprintJS Script -->
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #020617 0%, #000000 100%);
    color: #f8fafc;
    overflow: hidden;
}

/* Background Cyber Glow Effect */
body::before {
    content: '';
    position: absolute;
    width: 350px;
    height: 350px;
    background: #38bdf8;
    filter: blur(140px);
    opacity: 0.12;
    z-index: 1;
    pointer-events: none;
}

/* Premium Glassmorphism Box */
.box {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 380px;
    padding: 40px 30px;
    border-radius: 24px;
    background: rgba(10, 15, 26, 0.85);
    text-align: center;
    border: 1px solid rgba(56, 189, 248, 0.25);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(56, 189, 248, 0.05);
}

h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #38bdf8;
    text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    margin-bottom: 5px;
}

/* Status Layout Wrapper */
.status-container {
    margin-top: 25px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Ultra-Smooth Cyber Spinner */
.loader {
    width: 65px;
    height: 65px;
    border: 3px solid rgba(56, 189, 248, 0.1);
    border-top: 3px solid #38bdf8;
    border-bottom: 3px solid #0ea5e9;
    border-radius: 50%;
    margin-bottom: 25px;
    filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
    animation: spin 0.6s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

p#status {
    font-size: 15px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.3px;
}

/* Result Custom Boxes */
.result-card {
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    animation: fadeIn 0.4s ease-out forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Green Success Theme */
.success-theme {
    background: rgba(34, 197, 94, 0.06);
    border: 1px solid rgba(34, 197, 94, 0.35);
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
}
.success-title {
    color: #4ade80;
    font-weight: 700;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
    margin-bottom: 8px;
}
.success-msg {
    color: #cbd5e1;
    font-size: 14px;
}

/* Red Fail Theme */
.fail-theme {
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.35);
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
}
.fail-title {
    color: #f87171;
    font-weight: 700;
    font-size: 17px;
    text-shadow: 0 0 10px rgba(248, 113, 113, 0.3);
    margin-bottom: 8px;
}
.fail-msg {
    color: #94a3b8;
    font-size: 13px;
    line-height: 1.5;
}
</style>
</head>
<body>

<div class="box">
    <h2>Security Gateway</h2>
    
    <div class="status-container">
        <div id="loader" class="loader"></div>
        <p id="status">Initializing Terminal...</p>
    </div>
</div>

<script>
async function run(){
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");

    const tg = window.Telegram?.WebApp;
    if(tg){
        try {
            tg.ready();
            tg.expand();
        } catch(e) {}
    }

    /* URL PARAMS GETTER */
    const url = new URL(window.location.href);
    const botusername = url.searchParams.get("botusername");
    const bottoken = url.searchParams.get("bottoken");

    /* Param Validation Check */
    if(!botusername || !bottoken){
        loader.style.display = "none";
        status.innerHTML = `
            <div class="result-card fail-theme">
                <div class="fail-title">❌ BAD CONFIGURATION</div>
                <div class="fail-msg">Secure tokens are missing in URL mapping.</div>
            </div>
        `;
        return;
    }

    /* TG USER DATA EXTRACTION */
    let tg_id = "web_user";
    let name = "Agent";

    if(tg?.initDataUnsafe?.user){
        tg_id = tg.initDataUnsafe.user.id.toString();
        name = tg.initDataUnsafe.user.first_name || "User";
    }

    try {
        status.innerHTML = "🔐 Scanning Core Fingerprint...";

        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const browser_id = result.visitorId;

        status.innerHTML = "⚡ Requesting Database Sync...";

        // Calling backend API
        const api = `/api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browser_id)}`;

        const res = await fetch(api);
        
        if(!res.ok) throw new Error("Gateway Status Code (" + res.status + ")");
        
        const data = await res.json();

        // Hide loader before displaying result
        loader.style.display = "none";

        if(data && data.status === "pass"){
            status.innerHTML = `
                <div class="result-card success-theme">
                    <div class="success-title">✔ ACCESS GRANTED</div>
                    <div class="success-msg">Welcome, ${name}. Handshake complete.</div>
                </div>
            `;

            /* AUTO CLOSE SECURE DELAY SET TO 15 SECONDS (15000ms) */
            setTimeout(() => {
                if(tg) tg.close();
            }, 15000);

        } else {
            // Fail response: Page will NOT close automatically so user can see it
            status.innerHTML = `
                <div class="result-card fail-theme">
                    <div class="fail-title">🚫 SECURITY EXCLUSION</div>
                    <div class="fail-msg">
                        <b>Reason:</b> ${data.message || 'Verification Policy Violation'}<br>
                        <span style="font-size:11px; color:#64748b; display:block; margin-top:5px;">This session is blacklisted.</span>
                    </div>
                </div>
            `;
        }

    } catch(err){
        loader.style.display = "none";
        status.innerHTML = `
            <div class="result-card fail-theme">
                <div class="fail-title">⚠️ CONNECTION TERMINATED</div>
                <div class="fail-msg">${err.message || 'System engine exception logged.'}</div>
            </div>
        `;
    }
}

// Windows loading logic execution
window.onload = run;
</script>

</body>
</html>
