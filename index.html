<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Security Gateway</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.box{
    width:90%;
    max-width:380px;
    padding:25px;
    border-radius:18px;
    background:#0b1220;
    text-align:center;
    box-shadow:0 0 20px #000;
}

.loader{
    width:60px;
    height:60px;
    border:4px solid #1e293b;
    border-top:4px solid #38bdf8;
    border-radius:50%;
    margin:20px auto;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.success{color:#22c55e;}
.fail{color:#ef4444;}
</style>

</head>
<body>

<div class="box">

    <h2>Security Gateway</h2>

    <div id="loader" class="loader"></div>

    <p id="status">Initializing...</p>

</div>

<script>

async function run(){

    const status = document.getElementById("status");
    const loader = document.getElementById("loader");

    const tg = window.Telegram?.WebApp;

    if(tg){
        tg.ready();
        tg.expand();
    }

    /* URL PARAMS */
    const url = new URL(window.location.href);
    const botusername = url.searchParams.get("botusername");
    const bottoken = url.searchParams.get("bottoken");

    if(!botusername || !bottoken){
        loader.style.display="none";
        status.innerHTML = "❌ Missing Parameters";
        status.className = "fail";
        return;
    }

    /* TG USER ID */
    let tg_id = "web_user";
    let name = "User";

    if(tg?.initDataUnsafe?.user){
        tg_id = tg.initDataUnsafe.user.id.toString();
        name = tg.initDataUnsafe.user.first_name;
    }

    try {

        status.innerHTML = "Generating Device ID...";

        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const browser_id = result.visitorId;

        status.innerHTML = "Verifying...";

        const api = `/api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browser_id)}`;

        const res = await fetch(api);
        const data = await res.json();

        loader.style.display = "none";

        if(data.status === "pass"){

            status.innerHTML = `
                <div class="success">
                    ✅ VERIFIED SUCCESS<br><br>
                    Welcome ${name}
                </div>
            `;

            /* AUTO CLOSE ONLY ON SUCCESS */
            setTimeout(() => {
                tg?.close();
            }, 1200);

        } else {

            status.innerHTML = `
                <div class="fail">
                    ❌ VERIFICATION FAILED<br><br>
                    ${data.message || "Access Denied"}
                </div>
            `;
        }

    } catch(err){

        loader.style.display = "none";

        status.innerHTML = `
            <div class="fail">
                ⚠ SERVER ERROR<br><br>
                Try Again
            </div>
        `;

    }
}

run();

</script>

</body>
</html>
