<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification</title>
    <!-- Telegram Web App Script (ID capture karne ke liye) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Hardware Fingerprint capture karne ke liye library -->
    <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 360px; width: 100%; }
        .loading { color: #94a3b8; }
        .success { color: #4ade80; font-weight: bold; }
        .error { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <div id="status" class="loading">🔒 Fetching Telegram Identity & Securing Device...</div>
    </div>

    <script>
        async function startVerify() {
            // Telegram Web App initialize karna
            const tg = window.Telegram.WebApp;
            tg.ready();

            // Telegram user ka data automatically nikalna
            const initDataUnsafe = tg.initDataUnsafe;
            
            if (!initDataUnsafe || !initDataUnsafe.user) {
                document.getElementById('status').className = 'error';
                document.getElementById('status').innerText = "❌ Please open this link inside Telegram App!";
                return;
            }

            const tg_id = initDataUnsafe.user.id.toString();
            const first_name = initDataUnsafe.user.first_name || "User";

            // URL se botusername aur bottoken nikalna
            const params = new URLSearchParams(window.location.search);
            const botusername = params.get('botusername');
            const bottoken = params.get('bottoken');

            if (!botusername || !bottoken) {
                document.getElementById('status').className = 'error';
                document.getElementById('status').innerText = "❌ Bot parameters missing in Web App URL!";
                return;
            }

            try {
                // Browser ID capture karna (Anti-Rotation)
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                const browserId = result.visitorId;

                // Alag se banayi gayi Backend API (/verify-api) ko hit karna
                const res = await fetch(`/verify-api?botusername=${botusername}&bottoken=${bottoken}&tg_id=${tg_id}&browser_id=${browserId}&name=${encodeURIComponent(first_name)}`);
                const data = await res.json();

                if (data.status === 'pass') {
                    document.getElementById('status').className = 'success';
                    document.getElementById('status').innerHTML = `✅ Verified Successfully!<br><span style='font-size:13px;color:#94a3b8;'>Welcome ${first_name}. Closing...</span>`;
                    
                    // Success ke 2 second baad automatic webapp close ho jaye
                    setTimeout(() => { tg.close(); }, 2000);
                } else {
                    document.getElementById('status').className = 'error';
                    document.getElementById('status').innerText = "❌ Failed: " + data.message;
                }
            } catch (err) {
                document.getElementById('status').className = 'error';
                document.getElementById('status').innerText = "❌ Connection Error!";
            }
        }
        window.onload = startVerify;
    </script>
</body>
</html>
