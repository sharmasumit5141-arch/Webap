<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Gateway</title>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- FingerprintJS -->
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top,#0ea5e9 0%,#020617 35%,#000000 100%);
}

/* Glow Effect */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#38bdf8;
    filter:blur(150px);
    opacity:0.18;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{ transform:scale(1); }
    to{ transform:scale(1.2); }
}

/* Main Box */
.box{
    position:relative;
    z-index:2;
    width:92%;
    max-width:400px;
    padding:35px;
    border-radius:24px;
    text-align:center;
    background:rgba(15,23,42,0.82);
    border:1px solid rgba(56,189,248,0.3);
    backdrop-filter:blur(15px);
    box-shadow: 0 0 25px rgba(56,189,248,0.2), 0 0 80px rgba(0,0,0,0.5);
}

/* Logo */
.logo{
    width:85px;
    height:85px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    box-shadow:0 0 30px rgba(56,189,248,0.8);
    animation:float 1.2s infinite ease-in-out;
}

@keyframes float{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
    100%{ transform:translateY(0); }
}

h2{
    margin-top:18px;
    color:#7dd3fc;
    font-size:26px;
    text-shadow:0 0 12px rgba(56,189,248,0.7);
}

/* Ultra Fast Spinner */
.spinner{
    width:90px;
    height:90px;
    margin:30px auto;
    border-radius:50%;
    position:relative;
    animation:spin 0.35s linear infinite;
}

.spinner::before,
.spinner::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
}

.spinner::before{
    border:5px solid transparent;
    border-top-color:#38bdf8;
    border-bottom-color:#0ea5e9;
    filter:drop-shadow(0 0 10px #38bdf8);
}

.spinner::after{
    inset:12px;
    border:5px solid transparent;
    border-left-color:#7dd3fc;
    border-right-color:#38bdf8;
    animation:spinReverse 0.22s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:rotate(360deg); }
    to{ transform:rotate(0deg); }
}

/* Status */
.status-msg{
    color:#cbd5e1;
    line-height:1.7;
    min-height:60px;
}

/* Result Box */
.result-box{
    padding:18px;
    border-radius:18px;
    margin-top:10px;
}

.success-box{
    background:rgba(14,165,233,0.12);
    border:1px solid rgba(56,189,248,0.4);
}

.error-box{
    background:rgba(248,113,113,0.08);
    border:1px solid rgba(248,113,113,0.35);
}

.result-icon{
    font-size:38px;
    margin-bottom:10px;
}

.result-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:8px;
}

.result-text{
    font-size:14px;
    color:#cbd5e1;
}

</style>

</head>

<body>

<div class="box">

    <div class="logo">🔒</div>

    <h2>Security Gateway</h2>

    <div id="loader" class="spinner"></div>

    <div id="status" class="status-msg">
        🔄 Starting Verification...
    </div>

</div>

<script>

async function startVerify(){

    const statusDiv = document.getElementById('status');
    const loaderDiv = document.getElementById('loader');

    /* Telegram WebApp Object Initialization Safe Mode */
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if(tg){
        try {
            tg.ready();
            tg.expand();
        } catch(e) { console.log("TG init optimization skipped"); }
    }

    /* URL PARAMS COLLECTOR */
    let botusername = "";
    let bottoken = "";

    try{
        const urlObj = new URL(window.location.href);
        botusername = urlObj.searchParams.get('botusername');
        bottoken = urlObj.searchParams.get('bottoken');
    }catch(e){
        console.error("URL processing failure:", e);
    }

    /* Frontend Check for Parameters */
    if(!botusername || !bottoken){
        loaderDiv.style.display='none';
        statusDiv.innerHTML=`
        <div class="result-box error-box">
            <div class="result-icon">❌</div>
            <div class="result-title">CONFIGURATION MISSING</div>
            <div class="result-text">URL parameters (botusername/bottoken) are missing.</div>
        </div>
        `;
        return;
    }

    /* Extracting User Payload */
    let tg_id = "BROWSER_TEST_ID";
    let first_name = "User";

    if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
        if(tg.initDataUnsafe.user.id){
            tg_id = tg.initDataUnsafe.user.id.toString();
        }
        first_name = tg.initDataUnsafe.user.first_name || "User";
    }

    try {
        /* Step 1: Device Security Integrity Check */
        statusDiv.innerHTML = "🔒 Contacting Security Database...";
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const browserId = result.visitorId;

        /* Step 2: Database Query (Clean Clean Parameters Sync Only) */
        statusDiv.innerHTML = "⚡ Validating Gatekeeper Integrity...";
        const apiUrl = `${window.location.origin}/api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browserId)}`;

        const res = await fetch(apiUrl);

        if(!res.ok){
            throw new Error(`Database Server sent HTTP status ${res.status}`);
        }

        // Processing structured data packet
        const data = await res.json();
        
        /* Step 3: Conditional Routing Execution */
        if(data && data.status === 'pass'){
            loaderDiv.style.display='none';
            statusDiv.innerHTML=`
            <div class="result-box success-box">
                <div class="result-icon">✔</div>
                <div class="result-title">ACCESS GRANTED</div>
                <div class="result-text">Welcome back, ${first_name}. Sync completed.</div>
            </div>
            `;
            
            // Only close window when response verification has completely succeeded 
            if(tg){
                tg.close();
            }
        } else {
            // DATABASE LOGGED FAIL ACTIONS (Window will stay open so the user reads why they failed!)
            loaderDiv.style.display='none';
            statusDiv.innerHTML=`
            <div class="result-box error-box">
                <div class="result-icon">✖</div>
                <div class="result-title">SECURITY EXCLUSION</div>
                <div class="result-text">
                    <b>Reason:</b> ${data.message || 'Verification Policy Violation'}<br>
                    <span style="font-size:11px; color:#94a3b8; display:block; margin-top:5px;">This incident has been securely recorded.</span>
                </div>
            </div>
            `;
        }

    } catch(err) {
        console.error("Critical execution handler intercepted:", err);
        loaderDiv.style.display='none';
        statusDiv.innerHTML=`
        <div class="result-box error-box">
            <div class="result-icon">⚠</div>
            <div class="result-title">GATEWAY TIMEOUT</div>
            <div class="result-text">${err.message || 'Unknown network processing error'}</div>
        </div>
        `;
    }
}

window.onload = startVerify;

</script>

</body>
</html>
