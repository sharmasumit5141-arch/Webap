<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIO Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',sans-serif;
  background:#f0f4ff; color:#1a1a2e;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:20px;
}
.user-card {
  background:#fff; border-radius:16px; padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  width:100%; max-width:420px; margin-bottom:16px;
  box-shadow:0 2px 12px rgba(99,102,241,.1);
}
.user-info { display:flex; align-items:center; gap:12px; }
.user-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; }
.user-avatar-placeholder {
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:700; color:#fff; flex-shrink:0;
}
.user-name { font-size:16px; font-weight:700; color:#1e293b; }
.user-id   { font-size:12px; color:#94a3b8; margin-top:2px; }
.status-badge {
  background:#ede9fe; color:#6366f1;
  font-size:11px; font-weight:700;
  padding:6px 14px; border-radius:20px; letter-spacing:1px;
}
.status-badge.success { background:#dcfce7; color:#16a34a; }
.status-badge.failed  { background:#fee2e2; color:#dc2626; }
.main-card {
  background:#fff; border-radius:24px; padding:40px 30px 30px;
  width:100%; max-width:420px; text-align:center;
  box-shadow:0 4px 24px rgba(99,102,241,.12);
}
.shield-icon {
  width:80px; height:80px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  border-radius:22px; display:flex; align-items:center;
  justify-content:center; margin:0 auto 20px; font-size:38px;
}
h1 { font-size:24px; font-weight:800; color:#1e293b; margin-bottom:8px; }
.subtitle { font-size:14px; color:#94a3b8; margin-bottom:28px; line-height:1.6; }
.steps { text-align:left; margin-bottom:22px; }
.step { display:flex; align-items:center; gap:14px; padding:9px 0; }
.step-icon {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; flex-shrink:0;
  background:#f1f5f9; color:#94a3b8;
}
.step-icon.done    { background:#3b82f6; color:#fff; }
.step-icon.loading { background:#6366f1; color:#fff; }
.step-icon.error   { background:#ef4444; color:#fff; }
.step-text { font-size:15px; color:#94a3b8; font-weight:500; }
.step-text.active { color:#1e293b; }
.progress-bar { height:5px; background:#e2e8f0; border-radius:10px; overflow:hidden; margin-bottom:24px; }
.progress-fill {
  height:100%; background:linear-gradient(90deg,#3b82f6,#6366f1);
  border-radius:10px; width:0%; transition:width .5s ease;
}
.btn {
  width:100%; padding:15px; border:none; border-radius:14px;
  font-size:16px; font-weight:700; cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff; display:none;
}
.powered { margin-top:16px; font-size:12px; color:#94a3b8; }
.powered span { color:#6366f1; font-weight:700; }
.loader {
  display:inline-block; width:13px; height:13px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin .8s linear infinite; vertical-align:middle;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;">
  <div class="user-card">
    <div class="user-info">
      <div class="user-avatar-placeholder" id="avatarEl">?</div>
      <div>
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-id"   id="userId">ID: ...</div>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">VERIFYING</div>
  </div>

  <div class="main-card">
    <div class="shield-icon">🛡️</div>
    <h1>Device Verification</h1>
    <p class="subtitle" id="subtitle">Verifying your device automatically. Please wait...</p>
    <div class="steps">
      <div class="step"><div class="step-icon" id="s1">1</div><div class="step-text" id="t1">Collecting device info</div></div>
      <div class="step"><div class="step-icon" id="s2">2</div><div class="step-text" id="t2">Generating fingerprint</div></div>
      <div class="step"><div class="step-icon" id="s3">3</div><div class="step-text" id="t3">Verifying with server</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="btn" id="retryBtn" onclick="startVerification()">Retry</button>
    <div class="powered">Powered by <span>UNIO WALLET</span> ✅</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const tgUser = tg.initDataUnsafe?.user || null;
const tgId   = tgUser ? String(tgUser.id) : null;
const tgName = tgUser ? (tgUser.first_name + (tgUser.last_name ? " "+tgUser.last_name : "")) : "User";
const tgPhoto= tgUser?.photo_url || "";

const urlParams    = new URLSearchParams(window.location.search);
const botId        = urlParams.get("botid") || "default";
const BOT_USERNAME = urlParams.get("bot")   || "unio_firstwbot";
const refParam     = urlParams.get("ref")   || null;

document.getElementById("userName").textContent = tgName;
document.getElementById("userId").textContent   = "ID: " + (tgId || "Unknown");
if (tgPhoto) {
  const img = document.createElement("img");
  img.src = tgPhoto; img.className = "user-avatar";
  document.getElementById("avatarEl").replaceWith(img);
} else {
  document.getElementById("avatarEl").textContent = tgName?.[0]?.toUpperCase() || "?";
}

function getDeviceId() {
  const scr   = window.screen.width+"x"+window.screen.height;
  const lang  = navigator.language||"en";
  const tz    = Intl.DateTimeFormat().resolvedOptions().timeZone||"UTC";
  const cores = String(navigator.hardwareConcurrency||0);
  const mem   = String(navigator.deviceMemory||0);
  const touch = String(navigator.maxTouchPoints||0);
  const depth = String(window.screen.colorDepth||0);
  const raw   = scr+lang+tz+cores+mem+touch+depth;
  let hash=0;
  for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i);hash=hash&hash;}
  return "DEV"+Math.abs(hash).toString(36).toUpperCase();
}

function setStep(n,state){
  const icon=document.getElementById("s"+n),text=document.getElementById("t"+n);
  if(state==="done")         {icon.className="step-icon done";icon.textContent="✓";text.className="step-text active";}
  else if(state==="loading") {icon.className="step-icon loading";icon.innerHTML="<span class='loader'></span>";text.className="step-text active";}
  else if(state==="error")   {icon.className="step-icon error";icon.textContent="✕";text.className="step-text active";}
}
function setProgress(p){document.getElementById("progressFill").style.width=p+"%";}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function startVerification(){
  if(!tgId){
    document.getElementById("subtitle").textContent="Telegram se kholo!";
    document.getElementById("statusBadge").className="status-badge failed";
    document.getElementById("statusBadge").textContent="ERROR";
    return;
  }
  document.getElementById("retryBtn").style.display="none";
  document.getElementById("statusBadge").className="status-badge";
  document.getElementById("statusBadge").textContent="VERIFYING";
  document.getElementById("subtitle").textContent="Verifying your device automatically. Please wait...";

  setStep(1,"loading"); setProgress(20); await sleep(800); setStep(1,"done");
  setStep(2,"loading"); setProgress(50);
  const deviceId=getDeviceId(); await sleep(800); setStep(2,"done");
  setStep(3,"loading"); setProgress(75);

  try{
    const resp=await fetch("/api/check",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({device_id:deviceId,tg_id:tgId,tg_name:tgName,bot_id:botId,ref:refParam})
    });
    const data=await resp.json();
    setStep(3,"done"); setProgress(90); await sleep(500);

    const badge=document.getElementById("statusBadge");
    const sub=document.getElementById("subtitle");

    if(data.status==="success"||data.status==="already_mine"){
      badge.className="status-badge success";
      badge.textContent="VERIFIED";
      sub.textContent="Verified! Dashboard open ho raha hai...";
      setProgress(100);
      await sleep(800);
      window.location.href="/dashboard.html?tg_id="+tgId+"&tg_name="+encodeURIComponent(tgName)+"&bot_id="+botId+"&bot="+BOT_USERNAME;
    } else if(data.status==="failed"){
      badge.className="status-badge failed";
      badge.textContent="FAILED";
      sub.textContent="Yeh device kisi aur account se linked hai!";
      setStep(3,"error"); setProgress(100);
      setTimeout(()=>{
        tg.close();
        window.location.href="https://t.me/"+BOT_USERNAME+"?start=verifyidfail_"+deviceId+"_"+tgId;
      },1500);
    } else {
      badge.textContent="ERROR";
      sub.textContent="Server error! Retry karo.";
      document.getElementById("retryBtn").style.display="block";
    }
  } catch(err){
    setStep(3,"error");
    document.getElementById("subtitle").textContent="Network error! Retry karo.";
    document.getElementById("retryBtn").style.display="block";
  }
}

startVerification();
</script>
</body>
  </html>
