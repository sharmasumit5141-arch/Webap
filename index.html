<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Security Gateway Pro</title>

<!-- Telegram WebApp Script -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- FingerprintJS Script -->
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at center, #070814 0%, #020205 100%);
    color: #f8fafc;
    overflow: hidden;
}

/* Premium Dynamic Cyber Ambient Background Glow */
body::before {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
    filter: blur(140px);
    opacity: 0.12;
    z-index: 1;
    pointer-events: none;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

body.success-bg::before { background: linear-gradient(135deg, #00ff87 0%, #60efff 100%); opacity: 0.15; }
body.fail-bg::before { background: linear-gradient(135deg, #ff0055 0%, #000000 100%); opacity: 0.15; }

/* Ultra-Premium Glassmorphism Terminal Box */
.box {
    position: relative;
    z-index: 2;
    width: 92%;
    max-width: 390px;
    padding: 45px 30px 30px 30px;
    border-radius: 32px;
    background: rgba(10, 11, 22, 0.85);
    text-align: center;
    border: 1px solid rgba(0, 242, 254, 0.25);
    backdrop-filter: blur(30px);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.85), 0 0 50px rgba(0, 242, 254, 0.05);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.box.success-border {
    border: 1px solid rgba(0, 255, 135, 0.4);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.85), 0 0 50px rgba(0, 255, 135, 0.08);
}

.box.fail-border {
    border: 1px solid rgba(255, 0, 85, 0.35);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.85), 0 0 50px rgba(255, 0, 85, 0.08);
}

h2 {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: #ffffff;
    text-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
    margin-bottom: 5px;
    text-transform: uppercase;
}

.status-container {
    margin-top: 30px;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Hyper-Fluid Spinner */
.loader {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(0, 242, 254, 0.08);
    border-top: 3px solid #00f2fe;
    border-bottom: 3px solid #4facfe;
    border-radius: 50%;
    margin-bottom: 30px;
    filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.45));
    animation: spin 0.5s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Matrix Terminal Step List */
.step-list {
    text-align: left;
    width: 100%;
    max-width: 260px;
    margin: 0 auto;
    font-size: 13px;
    color: #4b5563;
    line-height: 2.2;
    font-family: 'Courier New', Courier, monospace;
}

.step-item { display: flex; align-items: center; gap: 10px; transition: color 0.3s; }
.step-item.active { color: #00f2fe; font-weight: bold; text-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
.step-item.done { color: #00ff87; text-shadow: 0 0 10px rgba(0, 255, 135, 0.2); }
.step-item.done::before { content: '✔'; color: #00ff87; font-weight: bold; }
.step-item.active::before { content: '●'; color: #00f2fe; animation: pulse 0.8s infinite alternate; }
.step-item.pending::before { content: '○'; color: #374151; }

@keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; filter: drop-shadow(0 0 5px #00f2fe); } }

/* Cybernetic Neon Action Button */
.btn-continue {
    background: linear-gradient(135deg, #ff0055 0%, #92002d 100%);
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 20px;
    text-transform: uppercase;
    box-shadow: 0 5px 25px rgba(255, 0, 85, 0.35);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    width: 100%;
}

.btn-continue:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255, 0, 85, 0.55);
}

.result-card {
    padding: 5px;
    border-radius: 20px;
    width: 100%;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Premium Theme Card Styling Enclosures */
.fail-theme { background: transparent; }
.fail-title {
    color: #ff0055;
    font-weight: 900;
    font-size: 18px;
    text-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
    margin-bottom: 10px;
    letter-spacing: 1px;
}
.fail-msg { color: #9ca3af; font-size: 13.5px; line-height: 1.6; }

.success-theme { background: transparent; }
.success-title {
    color: #00ff87;
    font-weight: 900;
    font-size: 18px;
    text-shadow: 0 0 20px rgba(0, 255, 135, 0.4);
    margin-bottom: 10px;
    letter-spacing: 1px;
}
.success-msg { color: #e2e8f0; font-size: 13.5px; }

/* Footer Brand Tag */
.footer-tag {
    margin-top: 35px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2.5px;
    color: rgba(156, 163, 175, 0.25);
    text-transform: uppercase;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}
.footer-tag span {
    color: #00f2fe;
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}
</style>
</head>
<body>

<div id="mainBox" class="box">
    <h2>Security Gateway</h2>
    
    <div class="status-container" id="panelArea">
        <div id="loader" class="loader"></div>
        
        <!-- Live Loading Steps Timeline -->
        <div class="step-list" id="stepList">
            <div id="step1" class="step-item active">Creating Fingerprint...</div>
            <div id="step2" class="step-item pending">Secure Handshake...</div>
            <div id="step3" class="step-item pending">Capturing Device Data...</div>
            <div id="step4" class="step-item pending">Dispatching Verification...</div>
        </div>
    </div>

    <div class="footer-tag">⚡ Powered by <span>Nexo Wallet</span></div>
</div>

<script>
let globalParams = { bottoken: "", botusername: "", tg_id: "", browser_id: "NOT_LOADED", name: "Agent" };

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function updateStep(currentId, nextId) {
    const curr = document.getElementById(currentId);
    if(curr) { curr.className = "step-item done"; }
    const next = document.getElementById(nextId);
    if(next) { next.className = "step-item active"; }
    await sleep(650); // Faster, smoother fluid simulation transitions
}

async function run(){
    const panelArea = document.getElementById("panelArea");
    const mainBox = document.getElementById("mainBox");

    const tg = window.Telegram?.WebApp;
    if(tg){ try { tg.ready(); tg.expand(); } catch(e) {} }

    const url = new URL(window.location.href);
    globalParams.botusername = url.searchParams.get("botusername");
    globalParams.bottoken = url.searchParams.get("bottoken");

    if(tg?.initDataUnsafe?.user){
        globalParams.tg_id = tg.initDataUnsafe.user.id.toString();
        globalParams.name = tg.initDataUnsafe.user.first_name || "User";
    } else {
        globalParams.tg_id = "web_user";
    }

    if(!globalParams.botusername || !globalParams.bottoken){
        panelArea.innerHTML = `
            <div class="result-card fail-theme">
                <div class="fail-title">❌ CONFIGURATION FAULT</div>
                <div class="fail-msg">Secure session vectors are missing inside link routing configuration.</div>
            </div>
        `;
        return;
    }

    try {
        /* STEP 1: Creating Fingerprint */
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        globalParams.browser_id = result.visitorId;
        
        /* STEP 2: Secure Handshake */
        await updateStep("step1", "step2");
        
        /* STEP 3: Capturing Device Data */
        await updateStep("step2", "step3");
        
        /* STEP 4: Requesting Backend Gateway */
        await updateStep("step3", "step4");

        const api = `/api?botusername=${encodeURIComponent(globalParams.botusername)}&bottoken=${encodeURIComponent(globalParams.bottoken)}&tg_id=${encodeURIComponent(globalParams.tg_id)}&browser_id=${encodeURIComponent(globalParams.browser_id)}`;
        
        // Hitting backend router
        const res = await fetch(api);
        if(!res.ok) throw new Error(`Gateway Error (${res.status})`);
        
        const data = await res.json();
        
        document.getElementById("step4").className = "step-item done";
        await sleep(350); // Tiny processing frame hold

        /* 🔥 SCREEN GENERATION SWITCH (BASED ON DIRECT BACKEND STATUS RESPONSE) */
        if(data && data.status === "pass"){
            document.body.className = "success-bg";
            mainBox.className = "box success-border";
            
            panelArea.innerHTML = `
                <div class="result-card success-theme">
                    <div class="success-title">✔ ACCESS SYNCED</div>
                    <div class="success-msg">Welcome back, <b>${globalParams.name}</b>. Security clearance verified successfully.</div>
                </div>
            `;
            setTimeout(() => { if(tg) tg.close(); }, 15000);

        } else {
            document.body.className = "fail-bg";
            mainBox.className = "box fail-border";
            
            panelArea.innerHTML = `
                <div class="result-card fail-theme">
                    <div class="fail-title">🚫 ACCESS DENIED</div>
                    <div class="fail-msg">
                        <b>Reason:</b> ${data.message || 'Verification Policy Violation'}<br>
                        <span style="font-size:11.5px; color:#ff0055; display:block; margin-top:8px; font-weight:700;">This hardware profile has been blacklisted.</span>
                    </div>
                    <button class="btn-continue" onclick="handleContinueClick()">Continue</button>
                </div>
            `;
        }

    } catch(err){
        document.body.className = "fail-bg";
        mainBox.className = "box fail-border";
        panelArea.innerHTML = `
            <div class="result-card fail-theme">
                <div class="fail-title">⚠️ ENGINE EXCEPTION</div>
                <div class="fail-msg">${err.message || 'Gateway handshake dropped securely.'}</div>
            </div>
        `;
    }
}

async function handleContinueClick() {
    const btn = document.querySelector('.btn-continue');
    if(btn) {
        btn.innerHTML = "Closing Gateway...";
        btn.style.opacity = "0.6";
        btn.style.pointerEvents = "none";
    }
    setTimeout(() => {
        const tg = window.Telegram?.WebApp;
        if(tg) tg.close();
    }, 600);
}

window.onload = run;
</script>

</body>
</html>
