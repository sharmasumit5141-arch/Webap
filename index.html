<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Gateway</title>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- FingerprintJS -->
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top,#0ea5e9 0%,#020617 35%,#000000 100%);
}

/* Glow Effect */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#38bdf8;
    filter:blur(150px);
    opacity:0.18;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{ transform:scale(1); }
    to{ transform:scale(1.2); }
}

/* Main Box */
.box{
    position:relative;
    z-index:2;
    width:92%;
    max-width:400px;
    padding:35px;
    border-radius:24px;
    text-align:center;
    background:rgba(15,23,42,0.82);
    border:1px solid rgba(56,189,248,0.3);
    backdrop-filter:blur(15px);
    box-shadow: 0 0 25px rgba(56,189,248,0.2), 0 0 80px rgba(0,0,0,0.5);
}

/* Logo */
.logo{
    width:85px;
    height:85px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    box-shadow:0 0 30px rgba(56,189,248,0.8);
    animation:float 1.2s infinite ease-in-out;
}

@keyframes float{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
    100%{ transform:translateY(0); }
}

h2{
    margin-top:18px;
    color:#7dd3fc;
    font-size:26px;
    text-shadow:0 0 12px rgba(56,189,248,0.7);
}

/* Ultra Fast Spinner */
.spinner{
    width:90px;
    height:90px;
    margin:30px auto;
    border-radius:50%;
    position:relative;
    animation:spin 0.35s linear infinite;
}

.spinner::before,
.spinner::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
}

.spinner::before{
    border:5px solid transparent;
    border-top-color:#38bdf8;
    border-bottom-color:#0ea5e9;
    filter:drop-shadow(0 0 10px #38bdf8);
}

.spinner::after{
    inset:12px;
    border:5px solid transparent;
    border-left-color:#7dd3fc;
    border-right-color:#38bdf8;
    animation:spinReverse 0.22s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:rotate(360deg); }
    to{ transform:rotate(0deg); }
}

/* Status */
.status-msg{
    color:#cbd5e1;
    line-height:1.7;
    min-height:60px;
}

/* Result Box */
.result-box{
    padding:18px;
    border-radius:18px;
    margin-top:10px;
}

.success-box{
    background:rgba(14,165,233,0.12);
    border:1px solid rgba(56,189,248,0.4);
}

.error-box{
    background:rgba(248,113,113,0.08);
    border:1px solid rgba(248,113,113,0.35);
}

.result-icon{
    font-size:38px;
    margin-bottom:10px;
}

.result-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:8px;
}

.result-text{
    font-size:14px;
    color:#cbd5e1;
}

</style>

</head>

<body>

<div class="box">

    <div class="logo">🔒</div>

    <h2>Security Gateway</h2>

    <div id="loader" class="spinner"></div>

    <div id="status" class="status-msg">
        🔄 Starting Verification...
    </div>

</div>

<script>

async function startVerify(){

    const statusDiv = document.getElementById('status');
    const loaderDiv = document.getElementById('loader');

    /* URL PARAMS */
    let botusername = "";
    let bottoken = "";

    try{
        const urlObj = new URL(window.location.href);
        botusername = urlObj.searchParams.get('botusername');
        bottoken = urlObj.searchParams.get('bottoken');
    }catch(e){}

    /* Missing Params Front-end Check */
    if(!botusername || !bottoken){
        loaderDiv.style.display='none';
        statusDiv.innerHTML=`
        <div class="result-box error-box">
            <div class="result-icon">❌</div>
            <div class="result-title">CONFIGURATION MISSING</div>
            <div class="result-text">URL Parameters Missing. Cannot request database.</div>
        </div>
        `;
        return;
    }

    /* Telegram WebApp Initialisation */
    let tg_id = "BROWSER_TEST_ID";
    let first_name = "Tester";

    const tg = window.Telegram ? window.Telegram.WebApp : null;

    if(tg){
        tg.ready();
        tg.expand(); 
        if(tg.initDataUnsafe.user){
            tg_id = tg.initDataUnsafe.user.id.toString();
            first_name = tg.initDataUnsafe.user.first_name || "User";
        }
    }

    try {
        /* 1. Device Scan (Fingerprint Id generate ho raha hai database key ke liye) */
        statusDiv.innerHTML = "🔒 Querying Security Database...";

        const fpPromise = FingerprintJS.load();
        const fp = await fpPromise;
        const result = await fp.get();
        const browserId = result.visitorId;

        /* 2. Database Authorization Request */
        statusDiv.innerHTML = "⚡ Verifying Integrity Status...";

        const apiUrl = `${window.location.origin}/api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browserId)}&name=${encodeURIComponent(first_name)}`;

        const res = await fetch(apiUrl);

        if(!res.ok){
            throw new Error("Database Communication Failure (" + res.status + ")");
        }

        const data = await res.json();
        loaderDiv.style.display='none';

        /* 3. Handling Response from Database Validation */
        if(data.status === 'pass'){
            if(tg){
                // Database check success -> Instant close bot par vapas bhejne ke liye
                tg.close();
            }

            statusDiv.innerHTML=`
            <div class="result-box success-box">
                <div class="result-icon">✔</div>
                <div class="result-title">VERIFICATION SUCCESSFUL</div>
                <div class="result-text">Access Synchronized with Database.<br>Redirecting...</div>
            </div>
            `;
        } else {
            /* DATABASE FAILED STATUS (Jaise: Multi-Account Detected) */
            statusDiv.innerHTML=`
            <div class="result-box error-box">
                <div class="result-icon">✖</div>
                <div class="result-title">ACCESS DENIED</div>
                <div class="result-text">
                    <b>Reason:</b> ${data.message}<br>
                    <span style="font-size:11px; color:#94a3b8;">This incident has been logged.</span>
                </div>
            </div>
            `;
        }

    }catch(err){
        console.error(err);
        loaderDiv.style.display='none';
        statusDiv.innerHTML=`
        <div class="result-box error-box">
            <div class="result-icon">⚠</div>
            <div class="result-title">CONNECTION ERROR</div>
            <div class="result-text">${err.message}</div>
        </div>
        `;
    }
}

window.onload = startVerify;

</script>

</body>
</html>
