<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Gateway Verification</title>

<!-- Telegram Web App -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Fingerprint -->
<script src="https://openfpcdn.io/fingerprintjs/v4"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:
    radial-gradient(circle at top,#0ea5e9 0%,#020617 35%,#000000 100%);
    color:#f8fafc;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    overflow:hidden;
}

/* Animated Glow */
body::before{
    content:'';
    position:absolute;

    width:450px;
    height:450px;

    background:#38bdf8;
    filter:blur(140px);

    opacity:0.18;

    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}

.box{
    position:relative;
    z-index:2;

    background:rgba(15,23,42,0.82);

    padding:35px;

    border-radius:24px;

    text-align:center;

    box-shadow:
    0 0 30px rgba(56,189,248,0.20),
    0 0 90px rgba(0,0,0,0.65);

    max-width:390px;
    width:92%;

    border:1px solid rgba(56,189,248,0.25);

    backdrop-filter:blur(14px);
}

/* Logo */
.logo{
    width:85px;
    height:85px;

    margin:auto;

    border-radius:50%;

    background:linear-gradient(135deg,#38bdf8,#0ea5e9);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:36px;

    box-shadow:0 0 30px rgba(56,189,248,0.7);

    animation:float 1.2s infinite ease-in-out;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
    100%{
        transform:translateY(0px);
    }
}

h2{
    margin-top:18px;
    font-size:26px;

    color:#7dd3fc;

    letter-spacing:0.5px;

    text-shadow:0 0 12px rgba(56,189,248,0.7);
}

/* Ultra Fast Spinner */

.spinner{
    margin:28px auto 20px;

    width:90px;
    height:90px;

    border-radius:50%;

    position:relative;

    animation:spin 0.35s linear infinite;
}

.spinner::before,
.spinner::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
}

.spinner::before{
    border:5px solid transparent;

    border-top-color:#38bdf8;
    border-bottom-color:#0ea5e9;

    filter:drop-shadow(0 0 12px #38bdf8);
}

.spinner::after{
    inset:12px;

    border:5px solid transparent;

    border-left-color:#7dd3fc;
    border-right-color:#38bdf8;

    animation:spinReverse 0.22s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{
    from{
        transform:rotate(360deg);
    }
    to{
        transform:rotate(0deg);
    }
}

/* Status */

.status-msg{
    font-size:16px;
    margin-top:10px;

    line-height:1.7;

    min-height:60px;

    color:#cbd5e1;
}

.loading{
    color:#cbd5e1;
}

.success{
    color:#38bdf8;
    font-weight:700;

    text-shadow:0 0 10px rgba(56,189,248,0.7);
}

.error{
    color:#f87171;
    font-weight:700;
}

/* Result Box */

.result-box{
    padding:18px;
    border-radius:18px;

    margin-top:10px;

    animation:pop 0.4s ease;
}

.success-box{
    background:rgba(14,165,233,0.12);

    border:1px solid rgba(56,189,248,0.45);

    box-shadow:0 0 25px rgba(56,189,248,0.20);
}

.error-box{
    background:rgba(248,113,113,0.08);

    border:1px solid rgba(248,113,113,0.35);
}

.result-icon{
    font-size:38px;
    margin-bottom:10px;
}

.result-title{
    font-size:20px;
    font-weight:700;

    margin-bottom:8px;
}

.result-text{
    font-size:14px;

    color:#cbd5e1;

    line-height:1.6;
}

/* Animation */

@keyframes pop{
    from{
        transform:scale(0.85);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Dots Animation */

.dots::after{
    content:'';
    animation:dots 1s infinite;
}

@keyframes dots{
    0%{content:'';}
    25%{content:'.';}
    50%{content:'..';}
    75%{content:'...';}
    100%{content:'';}
}

</style>
</head>

<body>

<div class="box">

    <div class="logo">🔒</div>

    <h2>Security Gateway</h2>

    <div id="loader" class="spinner"></div>

    <div id="status" class="status-msg loading">
        🔄 Starting Verification<span class="dots"></span>
    </div>

</div>

<script>

async function startVerify(){

    const statusDiv = document.getElementById('status');

    const loaderDiv = document.getElementById('loader');

    // URL Parameters

    let botusername = "";
    let bottoken = "";

    try{

        const urlObj = new URL(window.location.href);

        botusername = urlObj.searchParams.get('botusername');

        bottoken = urlObj.searchParams.get('bottoken');

    }catch(e){

        console.error("URL Parsing Failed",e);
    }

    // Missing Config

    if(!botusername || !bottoken){

        loaderDiv.style.display='none';

        statusDiv.className='status-msg error';

        statusDiv.innerHTML=`

        <div class="result-box error-box">

            <div class="result-icon">❌</div>

            <div class="result-title">
                CONFIGURATION MISSING
            </div>

            <div class="result-text">
                URL Parameters Require Authorization
            </div>

        </div>
        `;

        return;
    }

    // Telegram WebApp

    let tg_id="BROWSER_TEST_ID";

    let first_name="Tester";

    const tg = window.Telegram ? window.Telegram.WebApp : null;

    if(tg){

        tg.ready();

        if(tg.initDataUnsafe && tg.initDataUnsafe.user){

            tg_id=tg.initDataUnsafe.user.id.toString();

            first_name=tg.initDataUnsafe.user.first_name || "User";
        }
    }

    try{

        statusDiv.innerHTML=
        "🔒 Analyzing Hardware Integrity<span class='dots'></span>";

        // Fingerprint

        const fp = await FingerprintJS.load();

        const result = await fp.get();

        const browserId = result.visitorId;

        statusDiv.innerHTML=
        "⚡ Authorizing Secure Session<span class='dots'></span>";

        // API Request

        const apiUrl=
        `/verify-api?botusername=${encodeURIComponent(botusername)}&bottoken=${encodeURIComponent(bottoken)}&tg_id=${encodeURIComponent(tg_id)}&browser_id=${encodeURIComponent(browserId)}&name=${encodeURIComponent(first_name)}`;

        const res = await fetch(apiUrl);

        const data = await res.json();

        loaderDiv.style.display='none';

        // SUCCESS

        if(data.status === 'pass'){

            statusDiv.className='status-msg success';

            statusDiv.innerHTML=`

            <div class="result-box success-box">

                <div class="result-icon">✔</div>

                <div class="result-title">
                    VERIFICATION SUCCESSFUL
                </div>

                <div class="result-text">
                    Welcome Back, ${first_name}
                    <br>
                    Secure Access Granted
                </div>

            </div>
            `;

            // Auto Close Telegram Mini App

            if(tg){

                setTimeout(()=>{
                    tg.close();
                },1800);
            }

        }else{

            // FAILED

            statusDiv.className='status-msg error';

            statusDiv.innerHTML=`

            <div class="result-box error-box">

                <div class="result-icon">✖</div>

                <div class="result-title">
                    VERIFICATION FAILED
                </div>

                <div class="result-text">
                    ${data.message || "Authorization Rejected"}
                </div>

            </div>
            `;
        }

    }catch(err){

        console.error(err);

        loaderDiv.style.display='none';

        statusDiv.className='status-msg error';

        statusDiv.innerHTML=`

        <div class="result-box error-box">

            <div class="result-icon">⚠</div>

            <div class="result-title">
                CONNECTION REFUSED
            </div>

            <div class="result-text">
                Gateway Closed Or Database Timeout
            </div>

        </div>
        `;
    }
}

// Start

window.onload = startVerify;

</script>

</body>
</html>
